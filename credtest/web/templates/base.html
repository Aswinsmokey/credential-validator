<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CredTest{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">🔐 CredTest</span>
      <span class="tagline">Authorized Security Audits Only</span>
    </div>
    <div class="topbar-right">
      <label class="btn btn-secondary upload-btn">
        ▲ Upload Config
        <input type="file" id="config-upload-input" accept=".yaml,.yml" hidden>
      </label>
      <button class="btn btn-secondary" onclick="openPasteURLs()">+ Paste URLs</button>
      <button class="btn btn-secondary" onclick="openAddTarget()">+ Add Target</button>
      <button class="btn btn-secondary" onclick="reconAll()">⟳ Recon All</button>
      <button class="btn btn-primary" onclick="testAll()">▶▶ Test All</button>
    </div>
  </header>

  <div id="toast-container"></div>

  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Add Target Modal -->
  <div id="add-target-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeAddTarget()">
    <div class="modal-box">
      <h2 style="margin:0 0 16px">Add Target</h2>
      <div class="form-grid">
        <label>Name <input id="at-name" type="text" placeholder="my-app" class="form-input"></label>
        <label>Login URL <input id="at-url" type="url" placeholder="https://target.com/login" class="form-input"></label>
        <label>Username field name <input id="at-ufield" type="text" value="username" class="form-input"></label>
        <label>Password field name <input id="at-pfield" type="text" value="password" class="form-input"></label>
        <label>Content type
          <select id="at-ct" class="form-input">
            <option value="form">form (application/x-www-form-urlencoded)</option>
            <option value="json">json (application/json)</option>
          </select>
        </label>
        <label>Attack mode
          <select id="at-mode" class="form-input">
            <option value="cluster_bomb">cluster_bomb</option>
            <option value="pitchfork">pitchfork</option>
            <option value="sniper">sniper</option>
            <option value="battering_ram">battering_ram</option>
          </select>
        </label>
      </div>
      <p style="color:var(--muted);font-size:12px;margin-top:12px">
        Tip: If you're unsure of the field names, save this target then click <b>⟳ Recon</b> — it will auto-detect them.
      </p>
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeAddTarget()">Cancel</button>
        <button class="btn btn-primary" onclick="submitAddTarget()">Add Target</button>
      </div>
    </div>
  </div>

  <!-- Paste URLs Modal -->
  <div id="paste-urls-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closePasteURLs()">
    <div class="modal-box" style="width:560px">
      <h2 style="margin:0 0 8px">Paste Login URLs</h2>
      <p style="color:var(--muted);font-size:13px;margin:0 0 14px">One URL per line. Recon runs automatically on all targets after import.</p>
      <textarea id="paste-urls-input" class="form-input" rows="10"
        style="width:100%;resize:vertical;font-family:monospace;font-size:13px"
        placeholder="https://app1.example.com/login&#10;https://app2.example.com/signin&#10;https://internal.corp/auth"></textarea>
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closePasteURLs()">Cancel</button>
        <button class="btn btn-primary" onclick="submitPasteURLs()">Import &amp; Recon All</button>
      </div>
    </div>
  </div>

  <script src="/static/js/websocket.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/test.js"></script>
  <script src="/static/js/export.js"></script>
</body>
</html>
